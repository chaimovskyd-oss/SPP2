<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>SPP2 - הכנת סביבה</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #141219;
      --panel: #201d29;
      --panel-2: #292536;
      --text: #f3f0ff;
      --muted: #aaa4bf;
      --accent: #7f6dff;
      --accent-2: #61d394;
      --danger: #ff7878;
      --border: #393247;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top right, rgba(127,109,255,0.18), transparent 34%), var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Arial", sans-serif;
      user-select: none;
    }
    .shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 22px 24px 18px;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 750;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .timer {
      direction: ltr;
      color: #c9c2ff;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
    }
    .status-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(32,29,41,0.94);
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .status-line {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 24px;
      font-size: 15px;
      font-weight: 650;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 6px rgba(97,211,148,0.12);
      animation: pulse 1.5s ease-in-out infinite;
      flex: 0 0 auto;
    }
    @keyframes pulse {
      50% { transform: scale(0.72); opacity: 0.55; }
    }
    .progress-track {
      height: 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #17141f;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #9f8cff);
      transition: width 0.35s ease;
    }
    .error-banner {
      display: none;
      border: 1px solid rgba(255,120,120,0.45);
      background: rgba(255,120,120,0.1);
      color: #ffadad;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      white-space: pre-wrap;
    }
    details {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(32,29,41,0.82);
      padding: 10px 12px;
      overflow: hidden;
    }
    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      list-style: none;
      margin-bottom: 8px;
    }
    summary::-webkit-details-marker { display: none; }
    .log {
      height: calc(100% - 28px);
      overflow: auto;
      direction: ltr;
      text-align: left;
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 11.5px;
      line-height: 1.5;
      color: #c2bad8;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
    }
    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 14px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button.danger {
      color: #ffadad;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="title-row">
      <div>
        <h1>מכין את SPP2 לראשונה</h1>
        <p class="subtitle">ההכנה יוצרת סביבת Python מקומית ומתקינה רק את הרכיבים שנבחרו.</p>
      </div>
      <div class="timer" id="elapsed">00:00</div>
    </div>

    <div class="error-banner" id="error"></div>

    <div class="status-card">
      <div class="status-line">
        <span class="dot" id="dot"></span>
        <span id="status">מתחיל...</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="bar"></div>
      </div>
    </div>

    <details id="details">
      <summary>פרטים טכניים</summary>
      <div class="log" id="log"></div>
    </details>

    <div class="footer">
      <span class="hint" id="hint">אפשר לבטל ולפתוח שוב את התוכנה לאחר מכן.</span>
      <div>
        <button id="continueBtn" class="primary" style="display:none">המשך עם הסביבה הקיימת</button>
        <button id="cancelBtn" class="danger">סגור</button>
      </div>
    </div>
  </div>

  <script>
    const $status = document.getElementById("status");
    const $bar = document.getElementById("bar");
    const $log = document.getElementById("log");
    const $err = document.getElementById("error");
    const $cancel = document.getElementById("cancelBtn");
    const $continue = document.getElementById("continueBtn");
    const $dot = document.getElementById("dot");
    const $elapsed = document.getElementById("elapsed");
    const $details = document.getElementById("details");
    const startTime = Date.now();
    const lines = [];

    setInterval(() => {
      const sec = Math.floor((Date.now() - startTime) / 1000);
      $elapsed.textContent = `${String(Math.floor(sec / 60)).padStart(2, "0")}:${String(sec % 60).padStart(2, "0")}`;
    }, 1000);

    function pushLog(line) {
      lines.push(line);
      if (lines.length > 600) lines.splice(0, lines.length - 600);
      $log.textContent = lines.join("\n");
      if ($details.open) $log.scrollTop = $log.scrollHeight;
    }

    function stopActivity() {
      $dot.style.animation = "none";
      $dot.style.opacity = "0.45";
    }

    window.sppBootstrap.onEvent((evt) => {
      if (evt.type === "stage") {
        $status.textContent = evt.message || "";
        if (typeof evt.progress === "number") {
          const pct = Math.max(0, Math.min(1, evt.progress)) * 100;
          $bar.style.width = `${pct}%`;
          if (evt.progress >= 1) stopActivity();
        }
      } else if (evt.type === "log") {
        pushLog(evt.line);
      } else if (evt.type === "component-failed") {
        pushLog(`רכיב נכשל: ${evt.id} - ${evt.message}`);
      } else if (evt.type === "error") {
        stopActivity();
        $err.textContent = `אירעה שגיאה: ${evt.message}`;
        $err.style.display = "block";
        $cancel.textContent = "סגור";
        if (evt.canContinue) $continue.style.display = "inline-block";
        $details.open = true;
      }
    });

    $cancel.addEventListener("click", async () => {
      $cancel.disabled = true;
      $status.textContent = "מבטל...";
      stopActivity();
      try { await window.sppBootstrap.resolve("abort"); } catch {}
      try { await window.sppBootstrap.cancel(); } catch {}
    });

    $continue.addEventListener("click", async () => {
      $continue.disabled = true;
      $cancel.disabled = true;
      try { await window.sppBootstrap.resolve("continue"); } catch {}
    });
  </script>
</body>
</html>
