<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>SPP2 — הכנת סביבה</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #17161c;
      --bg-elev: #211f29;
      --fg: #ece9f4;
      --muted: #9590a8;
      --accent: #6b8afd;
      --accent-2: #a98bff;
      --danger: #ff7676;
      --border: #2c2937;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: "Segoe UI", "Heebo", "Arial Hebrew", sans-serif;
      font-size: 14px;
      overflow: hidden;
      user-select: none;
    }
    .shell {
      height: 100%;
      display: flex; flex-direction: column;
      padding: 20px 22px 16px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 12.5px;
      margin-bottom: 18px;
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 21px;
      margin-bottom: 10px;
    }
    .status {
      font-size: 14px;
      flex: 1;
    }

    /* Elapsed timer */
    .elapsed {
      font-size: 11.5px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Pulsing activity dot */
    .activity-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0;
    }
    .activity-dot.active {
      opacity: 1;
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1);   }
      50%       { opacity: 0.35; transform: scale(0.7); }
    }

    /* ── Progress bar ── */
    .progress-track {
      position: relative;
      height: 8px;
      background: var(--bg-elev);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .progress-fill {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.4s ease;
    }
    /* Shimmer overlay — visible only when active */
    .progress-fill::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.18) 40%,
        rgba(255,255,255,0.32) 50%,
        rgba(255,255,255,0.18) 60%,
        transparent 100%
      );
      background-size: 250% 100%;
      opacity: 0;
      animation: shimmer 2s linear infinite;
    }
    .progress-fill.active::after { opacity: 1; }
    @keyframes shimmer {
      0%   { background-position: 160% center; }
      100% { background-position: -60% center; }
    }

    /* ── Log details ── */
    details {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      overflow: hidden;
    }
    details summary {
      cursor: pointer;
      list-style: none;
      color: var(--muted);
      font-size: 12px;
      padding: 2px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details[open] summary {
      margin-bottom: 6px;
      color: var(--fg);
    }
    summary::-webkit-details-marker { display: none; }

    /* Small arrow indicator */
    .summary-arrow {
      font-size: 10px;
      transition: transform 0.2s;
      display: inline-block;
    }
    details[open] .summary-arrow { transform: rotate(90deg); }

    /* "live" badge — pulses when there's activity */
    .live-badge {
      font-size: 10px;
      background: rgba(107,138,253,0.15);
      color: var(--accent);
      border: 1px solid rgba(107,138,253,0.3);
      border-radius: 3px;
      padding: 1px 5px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .live-badge.visible { opacity: 1; }

    .log {
      flex: 1;
      overflow-y: auto;
      direction: ltr;
      text-align: left;
      font-family: "Consolas", "Cascadia Mono", monospace;
      font-size: 11.5px;
      line-height: 1.45;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }
    /* Subtle scrollbar */
    .log::-webkit-scrollbar { width: 5px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    .hint { color: var(--muted); font-size: 11.5px; }
    button {
      background: var(--bg-elev);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    button:hover { border-color: var(--accent); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0e1a;
      font-weight: 600;
    }
    button.danger { color: var(--danger); }
    .error-banner {
      display: none;
      background: rgba(255,118,118,0.08);
      border: 1px solid rgba(255,118,118,0.35);
      color: var(--danger);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12.5px;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>מכין את SPP2 לראשונה</h1>
    <div class="subtitle">ההכנה רצה פעם אחת בלבד. בפעמים הבאות האפליקציה תיפתח מיד.</div>

    <div class="error-banner" id="error"></div>

    <div class="status-row">
      <div class="activity-dot" id="dot"></div>
      <div class="status" id="status">מתחיל…</div>
      <div class="elapsed" id="elapsed"></div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="bar"></div>
    </div>

    <details id="details">
      <summary>
        <span class="summary-arrow">▶</span>
        <span>פרטים טכניים</span>
        <span class="live-badge" id="liveBadge">LIVE</span>
      </summary>
      <div class="log" id="log"></div>
    </details>

    <div class="footer">
      <span class="hint" id="hint">ניתן לבטל ולסגור את האפליקציה.</span>
      <div>
        <button id="continueBtn" class="primary" style="display:none">המשך עם הסביבה הקיימת</button>
        <button id="cancelBtn" class="danger">ביטול</button>
      </div>
    </div>
  </div>

  <script>
    const $status   = document.getElementById("status");
    const $bar      = document.getElementById("bar");
    const $log      = document.getElementById("log");
    const $err      = document.getElementById("error");
    const $cancel   = document.getElementById("cancelBtn");
    const $continue = document.getElementById("continueBtn");
    const $dot      = document.getElementById("dot");
    const $elapsed  = document.getElementById("elapsed");
    const $details  = document.getElementById("details");
    const $live     = document.getElementById("liveBadge");

    // ── Elapsed timer ───────────────────────────────────────────────────────
    const startTime = Date.now();
    let elapsedInterval = null;

    function startElapsed() {
      if (elapsedInterval) return;
      elapsedInterval = setInterval(() => {
        const sec  = Math.floor((Date.now() - startTime) / 1000);
        const m    = String(Math.floor(sec / 60)).padStart(2, "0");
        const s    = String(sec % 60).padStart(2, "0");
        $elapsed.textContent = m + ":" + s;
      }, 1000);
    }

    function stopElapsed() {
      if (elapsedInterval) clearInterval(elapsedInterval);
      elapsedInterval = null;
    }

    // ── Log / auto-scroll ──────────────────────────────────────────────────
    const MAX_LOG_LINES = 600;
    let logLines = [];
    let _autoScroll = true; // follows bottom unless user scrolled up

    $log.addEventListener("scroll", () => {
      const distFromBottom = $log.scrollHeight - $log.scrollTop - $log.clientHeight;
      _autoScroll = distFromBottom < 50;
    });

    $details.addEventListener("toggle", () => {
      if ($details.open) {
        // Always jump to bottom when the panel is opened
        $log.scrollTop = $log.scrollHeight;
        _autoScroll = true;
      }
    });

    // Flash the LIVE badge for 1.5 s whenever a line arrives
    let liveFadeTimer = null;
    function flashLive() {
      $live.classList.add("visible");
      if (liveFadeTimer) clearTimeout(liveFadeTimer);
      liveFadeTimer = setTimeout(() => $live.classList.remove("visible"), 1500);
    }

    function pushLog(line) {
      logLines.push(line);
      if (logLines.length > MAX_LOG_LINES) logLines = logLines.slice(-MAX_LOG_LINES);
      $log.textContent = logLines.join("\n");
      flashLive();
      if ($details.open && _autoScroll) {
        $log.scrollTop = $log.scrollHeight;
      }
    }

    // ── Activity state ─────────────────────────────────────────────────────
    function setActive(on) {
      if (on) {
        $dot.classList.add("active");
        $bar.classList.add("active");
        startElapsed();
      } else {
        $dot.classList.remove("active");
        $bar.classList.remove("active");
        stopElapsed();
      }
    }

    setActive(true); // start immediately

    // ── IPC events ────────────────────────────────────────────────────────
    window.sppBootstrap.onEvent((evt) => {
      if (evt.type === "stage") {
        $status.textContent = evt.message || "";
        if (typeof evt.progress === "number") {
          const pct = Math.max(0, Math.min(1, evt.progress)) * 100;
          $bar.style.width = pct + "%";
          if (evt.progress >= 1) setActive(false);
        }
      } else if (evt.type === "log") {
        pushLog(evt.line);
      } else if (evt.type === "error") {
        setActive(false);
        $err.textContent = "אירעה שגיאה: " + evt.message;
        $err.style.display = "block";
        $cancel.textContent = "סגור";
        if (evt.canContinue) {
          $continue.style.display = "inline-block";
        }
        // Auto-open details on error so the user can see what happened
        $details.open = true;
      }
    });

    $cancel.addEventListener("click", async () => {
      $cancel.disabled = true;
      $status.textContent = "מבטל…";
      setActive(false);
      try { await window.sppBootstrap.resolve("abort"); } catch {}
      try { await window.sppBootstrap.cancel(); } catch {}
    });

    $continue.addEventListener("click", async () => {
      $continue.disabled = true;
      $cancel.disabled = true;
      try { await window.sppBootstrap.resolve("continue"); } catch {}
    });
  </script>
</body>
</html>
